<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>খেলতে খেলতে বিজ্ঞান (পর্ব-১৬)</title>
    
    <!-- Social Review Meta Tags (Open Graph / Facebook / Twitter) -->
    <meta property="og:title" content="খেলতে খেলতে বিজ্ঞান (পর্ব-১৬)">
    <meta property="og:description" content="এসএসসি ২০২৬ পরীক্ষার্থীদের জন্য বিশেষ ৪ দিনের ব্যবহারিক বিজ্ঞান কর্মশালা।">
    <meta property="og:image" content="../Banner 1.jpg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="../Banner 1.jpg">

    <!-- FontAwesome 6 Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #f8fafc;          
            --bg-card: #ffffff;          
            --accent-red: #ff4500; 
            --soft-blue: #3b82f6;        
            --text-dark: #1e293b;        
            --text-muted: #64748b;       
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-dark);
            position: relative;
        }

        /* ব্যাকগ্রাউন্ডে হালকা রঙিন সায়েন্স ওয়াটারমার্ক */
        .science-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 6rem;
            color: rgba(59, 130, 246, 0.05);
            z-index: 1;
            user-select: none;
            pointer-events: none;
        }

        /* মেইন কার্ড কন্টেইনার */
        .loading-container {
            text-align: center;
            z-index: 5;
            padding: 40px 30px;
            background: var(--bg-card);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            border-top: 6px solid var(--soft-blue);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        /* মূল টাইটেল (খেলতে খেলতে বিজ্ঞান) */
        .main-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        /* সাব-টাইটেল (১৬ তম পর্ব) */
        .sub-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-red);
            background: rgba(255, 69, 0, 0.08);
            padding: 6px 20px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 69, 0, 0.15);
        }

        /* আয়োজক সেকশন */
        .organizer {
            font-size: 1.05rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 35px;
        }

        .organizer span {
            color: var(--soft-blue);
            font-weight: 700;
        }

        /* মডার্ন প্রোগ্রেস বার */
        .progress-bar-container {
            width: 240px;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        .progress-line {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, var(--soft-blue), #60a5fa);
            border-radius: 10px;
            animation: loadProgress 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* লোডিং টেক্সট */
        .loading-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: pulseText 1.5s infinite alternate;
        }

        /* অ্যানিমেশন ইফেক্টস */
        @keyframes loadProgress {
            0% { width: 0%; }
            30% { width: 50%; }
            70% { width: 80%; }
            100% { width: 100%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseText {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }

        @media (max-width: 480px) {
            .main-title { font-size: 1.8rem; }
            .sub-title { font-size: 1.1rem; }
            .progress-bar-container { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- ব্যাকগ্রাউন্ড ওয়াটারমার্ক এলিমেন্ট -->
    <div class="science-bg">
        <div>⚛</div>
        <div>🔭</div>
    </div>

    <!-- মূল কন্টেন্ট বক্স -->
    <div class="loading-container">
        
        <!-- মূল টাইটেল ও সাবটাইটেল -->
        <h1 class="main-title">খেলতে খেলতে বিজ্ঞান</h1>
        <div class="sub-title">১৬ তম পর্ব</div>
        <p class="organizer">আয়োজনে: <span>ম্যাসল্যাব</span></p>

        <!-- প্রিমিয়াম লোডার -->
        <div class="progress-bar-container">
            <div class="progress-line"></div>
        </div>
        <div class="loading-text">Loading...</div>
    </div>

    <script>
        // ৩ সেকেন্ড (৩০০০ মিলিসেকেন্ড) পর স্বয়ংক্রিয়ভাবে হোমপেজে রিডাইরেক্ট করার লজিক
        setTimeout(function() {
            window.location.href = "../Home/";
        }, 3000);
    </script>
</body>
</html>
