<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>খেলতে খেলতে বিজ্ঞান | Registration</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="overlay"></div>

<div class="container">

<header>

<img src="assets/banner.jpg" class="banner">

</header>

<section class="card">

<h1>খেলতে খেলতে বিজ্ঞান</h1>

<h2>১৬তম পর্ব</h2>

<p class="subtitle">

এসএসসি ২০২৬ পরীক্ষার্থীদের জন্য নিবন্ধন

</p>

<form id="registrationForm">

<div class="input-box">

<label>নাম *</label>

<input type="text" id="name" required>

</div>

<div class="input-box">

<label>ইমেইল *</label>

<input type="email" id="email" required>

</div>

<div class="input-box">

<label>মোবাইল নম্বর *</label>

<input type="tel" id="mobile" required>

</div>

<div class="input-box">

<label>বিদ্যালয়ের নাম *</label>

<input type="text" id="school" required>

</div>

<div class="input-box">

<label>শ্রেণি *</label>

<select id="class">

<option>SSC 2026</option>

<option>Class 9</option>

<option>Class 8</option>

</select>

</div>

<div class="input-box">

<label>লিঙ্গ *</label>

<select id="gender">

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="input-box">

<label>জন্মতারিখ *</label>

<input type="date" id="dob">

</div>

<div class="input-box">

<label>আগে কোনো অলিম্পিয়াডে অংশগ্রহণ করেছ?</label>

<select id="olympiad">

<option>Yes</option>

<option>No</option>

</select>

</div>

<div class="input-box">

<label>অলিম্পিয়াডের নাম ও সাল</label>

<textarea id="olympiadName"></textarea>

</div>

<div class="input-box">

<label>bKash Transaction ID *</label>

<input type="text" id="trxid">

</div>

<div class="input-box">

<label>মন্তব্য</label>

<textarea id="comment"></textarea>

</div>

<button type="submit">

নিবন্ধন করুন

</button>

</form>

</section>

</div>

<script src="script.js"></script>

</body>

</html>
