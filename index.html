<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>খেলতে খেলতে বিজ্ঞান (পর্ব-১৬)</title>
    <!-- FontAwesome 6 Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --soft-blue: #2563eb;
            --accent-red: #ff4500;
            --text-light: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-light);
        }

        /* ব্যাকগ্রাউন্ডে হালকা সায়েন্স ওয়াটারমার্ক অ্যানিমেশন */
        .science-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 6rem;
            color: rgba(37, 99, 235, 0.03);
            z-index: 1;
            user-select: none;
            pointer-events: none;
        }

        /* মেইন কন্টেইনার */
        .loading-container {
            text-align: center;
            z-index: 5;
            padding: 20px;
            animation: fadeIn 1s ease-out;
        }

        /* লোগো/আইকন অ্যানিমেশন */
        .science-icon {
            font-size: 3.5rem;
            color: var(--soft-blue);
            margin-bottom: 20px;
            animation: spinAtom 4s linear infinite;
            display: inline-block;
        }

        @keyframes spinAtom {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); color: var(--accent-red); }
            100% { transform: rotate(360deg) scale(1); color: var(--soft-blue); }
        }

        /* মূল টাইটেল (খেলতে খেলতে বিজ্ঞান) */
        .main-title {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        /* সাব-টাইটেল (১৬ তম পর্ব) */
        .sub-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-red);
            background: rgba(255, 69, 0, 0.1);
            padding: 4px 18px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 69, 0, 0.2);
            letter-spacing: 0.5px;
        }

        /* আয়োজক সেকশন */
        .organizer {
            font-size: 1.05rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 40px;
        }

        .organizer span {
            color: #38bdf8;
            font-weight: 700;
        }

        /* মডার্ন প্রিমিয়াম প্রোগ্রেস বার */
        .progress-bar-container {
            width: 260px;
            height: 5px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-line {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, var(--soft-blue), #38bdf8);
            border-radius: 10px;
            box-shadow: 0 0 12px #38bdf8;
            animation: loadProgress 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* লোডিং টেক্সট */
        .loading-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: pulseText 1.5s infinite alternate;
        }

        /* অ্যানিমেশন ইফেক্টস */
        @keyframes loadProgress {
            0% { width: 0%; }
            30% { width: 45%; }
            70% { width: 85%; }
            100% { width: 100%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseText {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        @media (max-width: 480px) {
            .main-title { font-size: 2rem; }
            .sub-title { font-size: 1.15rem; }
            .progress-bar-container { width: 200px; }
        }
    </style>
</head>
<body>

    <!-- ব্যাকগ্রাউন্ড ওয়াটারমার্ক এলিমেন্ট -->
    <div class="science-bg">
        <div>⚛</div>
        <div>🔭</div>
    </div>

    <!-- মূল কন্টেন্ট বক্স -->
    <div class="loading-container">
        <!-- সায়েন্স রিলেটেড লাইভ আইকন -->
        <div class="science-icon">
            <i class="fas fa-atom"></i>
        </div>
        
        <!-- আপনার দেওয়া টেক্সট সমূহ -->
        <h1 class="main-title">খেলতে খেলতে বিজ্ঞান</h1>
        <div class="sub-title">১৬ তম পর্ব</div>
        <p class="organizer">আয়োজনে: <span>ম্যাসল্যাব</span></p>

        <!-- প্রিমিয়াম লোডার -->
        <div class="progress-bar-container">
            <div class="progress-line"></div>
        </div>
        <div class="loading-text">Loading...</div>
    </div>

    <script>
        // ৩ সেকেন্ড (৩০০০ মিলিসেকেন্ড) পর স্বয়ংক্রিয়ভাবে হোমপেজে রিডাইরেক্ট করার লজিক
        setTimeout(function() {
            window.location.href = "../Home/";
        }, 3000);
    </script>
</body>
</html>
