<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Registration Successful</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Hind Siliguri',sans-serif;
}

body{

background:#1f1a17;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

padding:20px;

}

.card{

background:#fff;

width:100%;
max-width:600px;

padding:40px;

border-radius:20px;

text-align:center;

box-shadow:0 20px 40px rgba(0,0,0,.35);

}

.check{

font-size:90px;

color:#28a745;

}

h1{

margin-top:15px;

color:#f4b400;

}

p{

margin-top:15px;

color:#555;

line-height:1.8;

}

button{

margin-top:30px;

padding:15px 35px;

background:#f4b400;

border:none;

color:#fff;

font-size:18px;

border-radius:12px;

cursor:pointer;

}

button:hover{

background:#d99b00;

}

</style>

</head>

<body>

<div class="card">

<div class="check">

✔

</div>

<h1>নিবন্ধন সফল হয়েছে</h1>

<p>

আপনার তথ্য সফলভাবে সংরক্ষণ করা হয়েছে।

</p>

<button onclick="downloadPDF()">

Registration Slip (PDF)

</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

function downloadPDF(){

const {jsPDF}=window.jspdf;

const doc=new jsPDF();

doc.setFontSize(18);

doc.text("Science Workshop Registration",20,20);

doc.setFontSize(12);

doc.text("Registration Successful",20,35);

doc.text("Participant information will be added in Part-3.",20,50);

doc.save("Registration_Slip.pdf");

}

</script>

</body>

</html>
